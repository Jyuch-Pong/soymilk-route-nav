<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>配送路線導航</title>
<style>
  :root{
    --bg-0:#11131a;
    --bg-1:#171a23;
    --card:#1d212c;
    --line:#2b2f3d;
    --cream:#f2e6cc;
    --cream-dim:#a9a496;
    --amber:#e2a545;
    --green:#5aa876;
    --blue:#5b84ab;
    --purple:#9b8ac1;
    --grey:#7c7f8c;
    --radius:14px;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--cream);}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse 900px 400px at 50% -10%, #2a2416 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-0) 0%, #14161d 100%);
    padding-bottom:40px;
  }

  header{
    position:sticky; top:0; z-index:20;
    background:rgba(17,19,26,0.94);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:14px 16px 12px;
  }
  .brand{
    display:flex; align-items:baseline; justify-content:space-between; gap:8px;
    margin-bottom:12px;
  }
  .brand h1{ font-size:17px; font-weight:800; letter-spacing:0.5px; margin:0; color:var(--cream); }
  .brand .date{ font-size:12px; color:var(--cream-dim); font-variant-numeric:tabular-nums; }

  .modeRow{ display:flex; gap:8px; margin-bottom:10px; }
  .modeBtn{
    flex:1; text-align:center; padding:9px 6px; border-radius:10px;
    background:var(--bg-1); border:1px solid var(--line);
    font-size:13px; font-weight:700; color:var(--cream-dim);
    cursor:pointer; user-select:none;
  }
  .modeBtn.active{ background:linear-gradient(180deg,#e2a545,#c8862a); color:#1a1305; border-color:transparent; }

  .letterRow{ display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .letterChip{
    width:34px; height:34px; border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg-1); border:1px solid var(--line);
    font-size:13px; font-weight:800; color:var(--grey);
    cursor:pointer; user-select:none;
  }
  .letterChip.active{ background:linear-gradient(180deg,#e2a545,#c8862a); color:#1a1305; border-color:transparent; }
  .letterChip.disabled{ opacity:.35; cursor:default; }

  .tabs{ display:flex; gap:8px; margin-bottom:10px; }
  .tab{
    flex:1; text-align:center; padding:9px 6px; border-radius:10px;
    background:var(--bg-1); border:1px solid var(--line);
    font-size:13px; font-weight:700; color:var(--cream-dim);
    cursor:pointer; user-select:none;
  }
  .tab.active{ background:rgba(226,165,69,.16); border-color:var(--amber); color:var(--amber); }
  .tab.disabled{ opacity:.3; cursor:default; }
  .tab .count{ font-weight:500; opacity:.8; font-size:11px; }

  .searchRow{ display:flex; gap:8px; align-items:center; }
  .searchBox{ flex:1; display:flex; align-items:center; gap:6px; background:var(--bg-1); border:1px solid var(--line); border-radius:10px; padding:8px 10px; }
  .searchBox input{ flex:1; border:none; background:transparent; outline:none; color:var(--cream); font-size:14px; }
  .searchBox input::placeholder{ color:var(--grey); }
  .searchBox svg{ flex:none; opacity:.6; }
  .resetBtn{ flex:none; padding:8px 10px; border-radius:10px; background:var(--bg-1); border:1px solid var(--line); color:var(--cream-dim); font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }

  .progressWrap{ padding:10px 16px 4px; }
  .progressLabel{ display:flex; justify-content:space-between; font-size:11px; color:var(--cream-dim); margin-bottom:6px; font-variant-numeric:tabular-nums; }
  .progressBar{ height:7px; border-radius:99px; background:var(--bg-1); overflow:hidden; border:1px solid var(--line); }
  .progressFill{ height:100%; border-radius:99px; background:linear-gradient(90deg,#c8862a,#e2a545); transition:width .25s ease; width:0%; }

  main{ padding:14px 16px 10px; max-width:640px; margin:0 auto; }
  .stop{ position:relative; display:flex; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; transition:opacity .2s ease; }
  .stop.done{ opacity:.45; }

  .stubCol{ flex:none; width:52px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:14px 0; background:var(--bg-1); border-right:1px dashed var(--line); }
  .seqNum{ font-family:"SF Mono","JetBrains Mono",Consolas,monospace; font-size:15px; font-weight:700; color:var(--amber); line-height:1; }
  .seqTotal{ font-family:"SF Mono","JetBrains Mono",Consolas,monospace; font-size:9px; color:var(--grey); margin-top:2px; }
  .codeTag{ font-family:"SF Mono","JetBrains Mono",Consolas,monospace; font-size:8.5px; color:var(--purple); margin-top:6px; }

  .body{ flex:1; padding:12px 12px 12px 14px; min-width:0; }
  .rowTop{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .storeName{ font-size:15.5px; font-weight:800; color:var(--cream); line-height:1.3; }
  .badgeGroup{ display:flex; gap:4px; flex-wrap:wrap; flex:none; justify-content:flex-end; }
  .badge{ flex:none; font-size:10.5px; font-weight:700; padding:3px 7px; border-radius:99px; white-space:nowrap; letter-spacing:.3px; }
  .badge.LINE{ background:rgba(90,168,118,.18); color:var(--green); }
  .badge.現場{ background:rgba(226,165,69,.18); color:var(--amber); }
  .badge.公司{ background:rgba(91,132,171,.18); color:var(--blue); }
  .badge.帶巡{ background:rgba(155,138,193,.2); color:var(--purple); }
  .badge.問{ background:rgba(124,127,140,.22); color:var(--grey); }
  .badge.其他{ background:rgba(124,127,140,.22); color:var(--grey); }

  .note{ font-size:12.5px; color:var(--cream-dim); margin-top:4px; line-height:1.5; }

  .addrBtn{ display:flex; align-items:center; gap:8px; margin-top:10px; padding:9px 10px; background:rgba(226,165,69,.09); border:1px solid rgba(226,165,69,.35); border-radius:10px; color:var(--cream); text-decoration:none; font-size:13px; cursor:pointer; }
  .addrBtn:active{ background:rgba(226,165,69,.2); }
  .addrBtn svg{ flex:none; color:var(--amber); }
  .addrBtn span{ flex:1; }
  .addrBtn .go{ flex:none; font-size:11px; font-weight:700; color:var(--amber); }

  .metaRow{ display:flex; align-items:center; justify-content:space-between; margin-top:9px; gap:8px; }
  .phoneLink{ display:flex; align-items:center; gap:5px; font-size:12px; color:var(--blue); text-decoration:none; font-variant-numeric:tabular-nums; }
  .phoneLink svg{ flex:none; }

  .doneBtn{ flex:none; display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:99px; background:var(--bg-1); border:1px solid var(--line); color:var(--cream-dim); font-size:12px; font-weight:700; cursor:pointer; }
  .doneBtn.on{ background:rgba(90,168,118,.18); border-color:rgba(90,168,118,.5); color:var(--green); }

  .emptyState{ text-align:center; padding:40px 20px; color:var(--grey); font-size:13px; line-height:1.7; }
  footer{ text-align:center; padding:18px 16px 6px; color:var(--grey); font-size:11px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1 id="titleLabel">🥛 配送路線導航</h1>
    <div class="date" id="dateLabel"></div>
  </div>

  <div class="modeRow" id="modeRow"></div>
  <div class="letterRow" id="letterRow" style="display:none;"></div>
  <div class="tabs" id="tabs"></div>

  <div class="searchRow">
    <div class="searchBox">

      <input type="text" id="searchInput" placeholder="搜尋店名或備註…">
    </div>
    <button class="resetBtn" id="resetBtn">重設今日</button>
  </div>
</header>

<div class="progressWrap">
  <div class="progressLabel">
    <span id="progressText">0 / 0 已完成</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progressBar"><div class="progressFill" id="progressFill"></div></div>
</div>

<main id="list"></main>

<footer>點地址卡片直接開啟 Google 導航・點完成標記今日已送達</footer>

const LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','Z'];
const DAY_GROUPS = [
  {id:'monThu', label:'一四'},
  {id:'tueFri', label:'二五'},
  {id:'wedSat', label:'三六'}
];
const SUB_DAYS = [
  {id:'route1', label:'禮拜一'},
  {id:'route2', label:'禮拜二'}
];

function todayKey(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
const TODAY = todayKey();

let mode = 'sub'; // 'sub' | 'main'
let currentSubDay = 'route1';
let currentLetter = LETTERS.find(l => DATA.mainlines[l]) || 'D';
let currentDayGroup = 'monThu';
let searchTerm = '';
let completedCache = {};

function currentStops(){
  if(mode === 'sub'){
    return (DATA.substitute[currentSubDay]) || [];
  } else {
    const line = DATA.mainlines[currentLetter];
    if(!line) return [];
    return line[currentDayGroup] || [];
  }
}

function currentStorageKey(){
  if(mode === 'sub') return 'progress:' + TODAY + ':sub:' + currentSubDay;
  return 'progress:' + TODAY + ':main:' + currentLetter + ':' + currentDayGroup;
}

async function loadCompleted(){
  const key = currentStorageKey();
  if(completedCache[key]) return completedCache[key];
  let set = new Set();
  try{
    const raw = localStorage.getItem(key);
    if(raw) set = new Set(JSON.parse(raw));
  }catch(e){}
  completedCache[key] = set;
  return set;
}
async function saveCompleted(set){
  const key = currentStorageKey();
  try{ localStorage.setItem(key, JSON.stringify(Array.from(set))); }catch(e){}
}

function mapsUrl(stop){
  return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(stop.navAddress) + '&travelmode=driving';
}
function telHref(phone){ return 'tel:' + phone.replace(/[^0-9+]/g,''); }

function methodTags(m){
  if(!m) return [{t:'其他',c:'其他'}];
  const tags = [];
  if(m.indexOf('LINE') !== -1) tags.push({t:'LINE',c:'LINE'});
  if(m.indexOf('現') !== -1) tags.push({t:'現場',c:'現場'});
  if(m.indexOf('公') !== -1) tags.push({t:'公司',c:'公司'});
  if(m.indexOf('帶巡') !== -1) tags.push({t:'帶巡',c:'帶巡'});
  if(m.indexOf('問') !== -1) tags.push({t:'問',c:'問'});
  if(tags.length === 0) tags.push({t:'其他',c:'其他'});
  return tags;
}

function svgPin(){ return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 22s7-7.5 7-12.5A7 7 0 0 0 5 9.5C5 14.5 12 22 12 22Z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="9.5" r="2.5" stroke="currentColor" stroke-width="2"/></svg>'; }
function svgPhone(){ return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6.5 3h3l1.5 4.5-2.2 1.5a12 12 0 0 0 6.2 6.2l1.5-2.2 4.5 1.5v3c0 1.1-.9 2-2.1 1.9C10.6 19 5 13.4 4.6 5.6 4.5 4.4 5.4 3.5 6.5 3.5V3Z" stroke="currentColor" stroke-width="1.6"/></svg>'; }
function svgCheck(){ return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4.5 4.5L19 7.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'; }

function renderModeRow(){
  const el = document.getElementById('modeRow');
  el.innerHTML = '';
  const modes = [{id:'sub', label:'代班路線'}, {id:'main', label:'主線路線'}];
  modes.forEach(mObj => {
    const div = document.createElement('div');
    div.className = 'modeBtn' + (mode === mObj.id ? ' active' : '');
    div.textContent = mObj.label;
    div.onclick = () => { mode = mObj.id; searchTerm=''; document.getElementById('searchInput').value=''; renderAll(); };
    el.appendChild(div);
  });
}

function renderLetterRow(){
  const el = document.getElementById('letterRow');
  if(mode !== 'main'){ el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = '';
  LETTERS.forEach(letter => {
    const available = !!DATA.mainlines[letter];
    const chip = document.createElement('div');
    chip.className = 'letterChip' + (letter === currentLetter ? ' active' : '') + (available ? '' : ' disabled');
    chip.textContent = letter;
    if(available){
      chip.onclick = () => {
        currentLetter = letter;
        const line = DATA.mainlines[letter];
        if(!line[currentDayGroup]){
          currentDayGroup = DAY_GROUPS.find(g => line[g.id])?.id || currentDayGroup;
        }
        searchTerm=''; document.getElementById('searchInput').value='';
        renderAll();
      };
    }
    el.appendChild(chip);
  });
}

function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  if(mode === 'sub'){
    SUB_DAYS.forEach(d => {
      const stops = DATA.substitute[d.id] || [];
      const div = document.createElement('div');
      div.className = 'tab' + (currentSubDay === d.id ? ' active' : '');
      div.innerHTML = d.label + '<div class="count">' + stops.length + ' 站</div>';
      div.onclick = () => { currentSubDay = d.id; searchTerm=''; document.getElementById('searchInput').value=''; renderAll(); };
      el.appendChild(div);
    });
  } else {
    const line = DATA.mainlines[currentLetter] || {};
    DAY_GROUPS.forEach(g => {
      const stops = line[g.id];
      const available = !!stops;
      const div = document.createElement('div');
      div.className = 'tab' + (currentDayGroup === g.id ? ' active' : '') + (available ? '' : ' disabled');
      div.innerHTML = g.label + '<div class="count">' + (available ? stops.length + ' 站' : '尚無資料') + '</div>';
      if(available){
        div.onclick = () => { currentDayGroup = g.id; searchTerm=''; document.getElementById('searchInput').value=''; renderAll(); };
      }
      el.appendChild(div);
    });
  }
}

async function toggleDone(seq){
  const set = await loadCompleted();
  if(set.has(seq)) set.delete(seq); else set.add(seq);
  await saveCompleted(set);
  renderList();
  renderProgress();
}

async function renderList(){
  const listEl = document.getElementById('list');
  const stops = currentStops();
  const set = await loadCompleted();
  const term = searchTerm.trim().toLowerCase();

  listEl.innerHTML = '';

  if(stops.length === 0){
    listEl.innerHTML = '<div class="emptyState">這條路線的資料還沒有匯入喔。<br>傳 Word 檔給我就能加進來。</div>';
    return;
  }

  let visibleCount = 0;

  stops.forEach(stop => {
    const matches = !term ||
      stop.name.toLowerCase().indexOf(term) !== -1 ||
      (stop.note||'').toLowerCase().indexOf(term) !== -1 ||
      (stop.address||'').toLowerCase().indexOf(term) !== -1 ||
      (stop.code||'').toLowerCase().indexOf(term) !== -1;

    if(!matches) return;
    visibleCount++;

    const isDone = set.has(stop.seq);
    const tags = methodTags(stop.method);
    const badgesHtml = tags.map(t => '<div class="badge ' + t.c + '">' + t.t + '</div>').join('');

    const phoneHtml = stop.phone ? (
      '<a class="phoneLink" href="'+ telHref(stop.phone) +'" onclick="event.stopPropagation()">' + svgPhone() + '<span>' + stop.phone + '</span></a>'
    ) : '<span></span>';

    const card = document.createElement('div');
    card.className = 'stop' + (isDone ? ' done' : '');

    card.innerHTML = `
      <div class="stubCol">
        <div class="seqNum">${String(stop.seq).padStart(2,'0')}</div>
        <div class="seqTotal">/${stops.length}</div>
        ${stop.code ? `<div class="codeTag">#${stop.code}</div>` : ''}
      </div>
      <div class="body">
        <div class="rowTop">
          <div class="storeName">${stop.name}</div>
          <div class="badgeGroup">${badgesHtml}</div>
        </div>
        ${stop.note ? `<div class="note">${stop.note}</div>` : ''}
        <a class="addrBtn" href="${mapsUrl(stop)}" target="_blank" rel="noopener">
          ${svgPin()}
          <span>${stop.address}</span>
          <span class="go">導航</span>
        </a>
        <div class="metaRow">
          ${phoneHtml}
          <div class="doneBtn ${isDone ? 'on' : ''}" data-seq="${stop.seq}">
            ${svgCheck()}<span>${isDone ? '已送達' : '標記完成'}</span>
          </div>
        </div>
      </div>
    `;

    card.querySelector('.doneBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDone(stop.seq);
    });

    listEl.appendChild(card);
  });

  if(visibleCount === 0){
    listEl.innerHTML = '<div class="emptyState">找不到符合的店家</div>';
  }
}

async function renderProgress(){
  const stops = currentStops();
  const set = await loadCompleted();
  const done = set.size;
  const total = stops.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressText').textContent = done + ' / ' + total + ' 已完成';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderTitle(){
  const el = document.getElementById('titleLabel');
  if(mode === 'sub') el.textContent = '🥛 代班路線導航';
  else el.textContent = '🥛 主線路線導航・' + currentLetter;
}

async function renderAll(){
  renderModeRow();
  renderLetterRow();
  renderTabs();
  renderTitle();
  await renderList();
  await renderProgress();
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderList();
});

document.getElementById('resetBtn').addEventListener('click', async () => {
  const label = mode === 'sub'
    ? (SUB_DAYS.find(d=>d.id===currentSubDay)||{}).label
    : currentLetter + '-' + (DAY_GROUPS.find(g=>g.id===currentDayGroup)||{}).label;
  if(!confirm('確定要重設今天「' + label + '」的完成標記嗎?')) return;
  const key = currentStorageKey();
  completedCache[key] = new Set();
  await saveCompleted(completedCache[key]);
  renderList();
  renderProgress();
});

document.getElementById('dateLabel').textContent = TODAY;

// init default day group to first available for currentLetter
(function initDefaults(){
  const line = DATA.mainlines[currentLetter];
  if(line && !line[currentDayGroup]){
    currentDayGroup = DAY_GROUPS.find(g => line[g.id])?.id || currentDayGroup;
  }
})();

renderAll();
</script>
